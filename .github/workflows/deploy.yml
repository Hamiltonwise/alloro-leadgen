name: Build and Deploy React

# Env strategy:
#   All build-time env vars live in a single GitHub Actions secret named
#   `DOTENV` — its value is the full text of a `.env` file (one KEY=value
#   per line, comments allowed). The workflow writes that secret to `.env`
#   before `npm run build`, so Vite picks up every VITE_* var as usual.
#
#   To add / rotate a var:
#     Settings → Secrets and variables → Actions → edit DOTENV.
#   No workflow changes needed when the set of vars changes.
#
#   Host / SSH credentials stay as individual secrets because they're
#   deploy-time (not build-time) and never touch Vite.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env from DOTENV secret
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: printf '%s' "$DOTENV" > .env

      - name: Install & Build React
        run: |
          npm install
          npm run build

      - name: Deploy to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "~/audit"
          strip_components: 1
